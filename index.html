<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#111827">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="トレ記録">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<title>体づくり トレ記録</title>
<style>
:root{--bg:#f3f4f6;--card:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--faint:#9ca3af;--gold:#a47e1b;--accent:#111827;--rest:#0f6e56;--rest-bg:#e1f5ee;--danger:#a32d2d;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",Arial,sans-serif;line-height:1.5;}
.wrap{max-width:560px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 12px) 14px calc(env(safe-area-inset-bottom) + 86px);}
h2{font-size:17px;margin:2px 0 10px;}
header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;}
.brand{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:600;}
.dot{width:22px;height:22px;border-radius:6px;background:var(--accent);position:relative;}
.dot::before{content:"";position:absolute;left:4px;right:4px;top:9px;height:4px;background:var(--gold);border-radius:2px;}
select,input,button,textarea{font-family:inherit;font-size:16px;color:var(--text);}
select{padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);}
button{cursor:pointer;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.ctop{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.exname{font-size:16px;font-weight:600;}
.rest{font-size:12px;color:var(--muted);background:#f3f4f6;border-radius:8px;padding:3px 8px;white-space:nowrap;}
.prev{font-size:13px;color:var(--muted);margin:6px 0 2px;}
.prev b{color:var(--text);font-weight:600;}
.scheme{color:var(--faint);}
.inrow{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.inrow input{width:74px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;text-align:center;}
.x{color:var(--faint);font-size:18px;}
.reco{font-size:13px;margin:8px 0 2px;color:#0f5a45;background:var(--rest-bg);border-radius:10px;padding:7px 10px;line-height:1.5;}
.reco b{font-weight:700;font-size:15px;}
.reco.faint{color:var(--muted);background:#f3f4f6;}
.ig{display:flex;flex-direction:column;gap:3px;}
.ig label{font-size:11px;color:var(--muted);}
.ig input{width:92px;padding:11px 8px;border:1px solid var(--line);border-radius:10px;text-align:center;font-size:18px;}
.rec{margin-left:auto;padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-weight:600;}
.pre{padding:9px 10px;background:#fff;border:1px solid var(--line);border-radius:10px;color:var(--muted);font-size:13px;}
.sets{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;background:#eef2f1;color:#0f6e56;border-radius:8px;padding:4px 8px;}
.chip .del{color:#9ca3af;font-weight:700;padding:0 2px;}
.btn{padding:9px 14px;background:#fff;border:1px solid var(--line);border-radius:10px;font-weight:600;}
.btn.primary{background:var(--accent);color:#fff;border:none;}
.btn.sm{padding:6px 10px;font-size:13px;}
.tchip{position:fixed;top:calc(env(safe-area-inset-top) + 8px);left:50%;transform:translateX(-50%);z-index:30;background:var(--rest);color:#fff;border-radius:999px;padding:8px 16px;font-weight:700;font-variant-numeric:tabular-nums;display:none;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.tchip.done{background:var(--danger);}
#toast{position:fixed;top:calc(env(safe-area-inset-top) + 8px);left:50%;transform:translateX(-50%);z-index:120;display:none;background:#0f6e56;color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;line-height:1.55;text-align:center;max-width:90%;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .4s;}
#toast b{font-size:17px;}
.timer{background:var(--rest-bg);border:1px solid #bfe6d7;border-radius:14px;padding:12px 14px;margin-bottom:12px;display:none;}
.timer.done{background:#fde0e0;border-color:#f3b6b6;}
.tr1{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--rest);font-weight:600;}
.timer.done .tr1{color:var(--danger);}
.tr2{display:flex;align-items:center;gap:10px;margin-top:6px;}
.tnum{font-size:40px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--rest);min-width:96px;}
.timer.done .tnum{color:var(--danger);}
.tbarwrap{flex:1;height:8px;background:#fff;border-radius:99px;overflow:hidden;}
.tbar{height:100%;width:100%;background:var(--rest);}
.tbtn{padding:8px 12px;border:1px solid #bfe6d7;background:#fff;color:var(--rest);border-radius:10px;font-size:13px;font-weight:600;}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.metric{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;}
.metric .lab{font-size:12px;color:var(--muted);}
.metric .val{font-size:22px;font-weight:700;margin-top:2px;}
.row{display:flex;align-items:center;gap:8px;}
.muted{color:var(--muted);}
.faint{color:var(--faint);font-size:12px;}
label.fld{font-size:13px;color:var(--muted);display:block;margin-bottom:4px;}
input.txt,select.sel{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:10px;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal .h{font-size:11px;color:var(--faint);text-align:center;padding:4px 0;}
.cell{aspect-ratio:1;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;background:#fff;position:relative;}
.cell.empty{border:none;background:transparent;}
.cell.has{border-color:#bfe6d7;background:var(--rest-bg);color:#0f5a45;font-weight:600;}
.cell .mk{position:absolute;bottom:4px;display:flex;gap:2px;}
.cell .mk i{width:5px;height:5px;border-radius:50%;display:block;}
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
.tab{flex:1;border:none;background:none;padding:9px 0 8px;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab .ic{width:22px;height:22px;}
.tab.active{color:var(--accent);font-weight:600;}
.tab.active .ic{stroke:var(--accent);}
.tab .ic{stroke:var(--muted);fill:none;stroke-width:1.8;}
textarea.memo{width:100%;height:64px;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:14px;}
.hide{display:none;}
.del2{color:var(--danger);background:none;border:none;font-size:13px;padding:4px;}
svg.chart{width:100%;height:170px;display:block;}
.ver{text-align:center;color:var(--faint);font-size:11px;margin-top:12px;}
</style>
</head>

  function parseScheme(sc){if(!sc)return{lo:8,hi:12,sets:3};var p=sc.split('×');var rn=(p[0].match(/\d+/g)||[]).map(Number);var sn=(p[1]||'').match(/\d+/g)||[3];var lo=rn[0]||8,hi=rn[1]||lo;return{lo:lo,hi:hi,sets:Number(sn[0])||3};}
  function round25(x){return Math.round(x/2.5)*2.5;}

  function e1rm(w,r){return w*(1+r/30);}
  function e1rmBest(ex){var m=0;S.logs.filter(function(l){return l.exercise===ex;}).forEach(function(l){var e=e1rm(l.weight,l.reps);if(e>m)m=e;});return m;}
  function maxWeight(ex){var m=0;S.logs.filter(function(l){return l.exercise===ex;}).forEach(function(l){if(l.weight>m)m=l.weight;});return m;}
  function confetti(){var c=document.createElement('canvas');c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:110;';c.width=window.innerWidth;c.height=window.innerHeight;document.body.appendChild(c);var x=c.getContext('2d');var cols=['#d4af37','#0f6e56','#e24b4a','#378add','#f0997b'];var ps=[];for(var i=0;i<90;i++){ps.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*0.3,vx:(Math.random()-0.5)*3,vy:2+Math.random()*4,s:5+Math.random()*6,col:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-0.5)*0.3});}var t0=performance.now();function fr(now){var el=now-t0;x.clearRect(0,0,c.width,c.height);ps.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.rot+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.globalAlpha=Math.max(0,1-el/2300);x.fillStyle=p.col;x.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);x.restore();});if(el<2300)requestAnimationFrame(fr);else c.remove();}requestAnimationFrame(fr);}
  function cheer(){var a=getAC();if(a){try{[660,880,1175].forEach(function(f,i){var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='triangle';o.frequency.value=f;g.gain.value=0.35;o.start(a.currentTime+i*0.12);o.stop(a.currentTime+i*0.12+0.14);});}catch(e){}}if(navigator.vibrate)navigator.vibrate([60,40,60,40,140]);}
  function toast(html){var t=document.getElementById('toast');t.innerHTML=html;t.style.display='block';t.style.opacity='1';if(t._t)clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.style.display='none';},400);},4500);}
  function celebratePR(ex,newE,priorE,w,priorW){confetti();cheer();var prE=priorE>0&&newE>priorE+0.01,prW=priorW>0&&w>priorW;var msg='🎉 自己ベスト更新！<br><b>'+ex+'</b>';if(prE)msg+='<br>推定1RM <b>'+Math.round(newE)+'kg</b>（前 '+Math.round(priorE)+'kg）';if(prW)msg+='<br>最高重量 <b>'+fmtW(w)+'kg</b>';if(/ベンチ/.test(ex)){var best=Math.max(newE,priorE);var rem=140-Math.round(best);msg+=rem>0?('<br>🎯 ベンチ140kgまであと '+rem+'kg'):'<br>🔥 140kg到達圏！';}toast(msg);}
  function renderRec(){

  var tId=null,endAt=0,total=0,wake=null;

  function mmss(s){var m=Math.floor(s/60),x=s%60;return m+':'+(x<10?'0':'')+x;}

  function keepAliveStart(){var a=getAC();if(!a||silentSrc)return;try{var buf=a.createBuffer(1,a.sampleRate,a.sampleRate);var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.sin(i*0.02)*0.0006;silentSrc=a.createBufferSource();silentSrc.buffer=buf;silentSrc.loop=true;silentSrc.connect(a.destination);silentSrc.start();}catch(e){}}

  function ensurePush(){if(!('serviceWorker' in navigator)||!('PushManager' in window))return Promise.resolve(null);if(pushSub)return Promise.resolve(pushSub);return navigator.serviceWorker.ready.then(function(reg){return reg.pushManager.getSubscription().then(function(s){if(s){pushSub=s;return s;}if(!('Notification' in window)||Notification.permission!=='granted')return null;return reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)}).then(function(ns){pushSub=ns;return ns;});});}).catch(function(){return null;});}

  function tick(){var rem=Math.max(0,Math.round((endAt-Date.now())/1000));tnum.textContent=mmss(rem);tchip.textContent='休憩 '+mmss(rem);tbar.style.width=(total?Math.round(rem/total*100):0)+'%';
    if(rem<=0){clearInterval(tId);tId=null;tEl.classList.add('done');tchip.classList.add('done');tlabel.textContent='休憩おわり！次のセットへ';tchip.textContent='休憩おわり';cancelAlarm();playAlarmEl();cancelPush();if(navigator.vibrate)navigator.vibrate([300,120,300,120,300]);relWake();notifyEnd();}}
  function startTimer(sec,ex){if(tId)clearInterval(tId);if(kaStopT){clearTimeout(kaStopT);kaStopT=null;}total=sec;endAt=Date.now()+sec*1000;tEl.style.display='block';tEl.classList.remove('done');tchip.classList.remove('done');tchip.style.display='block';tlabel.textContent='休憩中';tex.textContent=ex;reqWake();schedulePush(sec);if('Notification' in window&&Notification.permission==='default'){try{Notification.requestPermission().then(function(p){if(p==='granted')ensurePush();});}catch(e){}}tick();tId=setInterval(tick,250);}
  function beep(){var a=getAC();if(a){try{var o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type='sine';o.frequency.value=880;g.gain.value=0.4;o.start();setTimeout(function(){try{o.frequency.value=1175;}catch(e){}},170);setTimeout(function(){try{o.stop();}catch(e){}},520);}catch(e){}}if(navigator.vibrate)navigator.vibrate([300,120,300]);}
  document.getElementById('tadd').addEventListener('click',function(){endAt+=30000;total+=30;if(!tId){tEl.classList.remove('done');tchip.classList.remove('done');reqWake();tId=setInterval(tick,250);}tick();});
  document.getElementById('tskip').addEventListener('click',function(){if(tId)clearInterval(tId);tId=null;tEl.style.display='none';tchip.style.display='none';cancelAlarm();keepAliveStop();cancelPush();relWake();});
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible'){if(ac&&ac.state==='suspended'){try{ac.resume();}catch(e){}}if(tId)reqWake();}});

  function buildExport(from){
    var ds=[];for(var i=0;i<(from==='7'?7:1);i++){ds.push(new Date(Date.now()-i*86400000).toISOString().slice(0,10));}
    var lines=[];ds.sort();
    ds.forEach(function(d){
      var t=S.logs.filter(function(l){return l.date===d;}).sort(function(a,b){return a.exercise.localeCompare(b.exercise)||a.setNo-b.setNo;});
      var m=S.meals.filter(function(x){return x.date===d;});
      var c=S.cardio.filter(function(x){return x.date===d;});
      var b=S.body.filter(function(x){return x.date===d;})[0];
      if(!t.length&&!m.length&&!c.length&&!b&&!S.notes[d])return;
      lines.push('=== LOG '+d+' ===');
      m.forEach(function(x){lines.push('MEAL,'+d+','+x.label+','+Math.round(x.kcal)+',,,');});
      t.forEach(function(l){lines.push('TRAIN,'+d+','+l.exercise+','+l.setNo+','+fmtW(l.weight)+','+l.reps);});
      c.forEach(function(x){lines.push('CARDIO,'+d+','+x.type+','+x.minutes+','+Math.round(x.kcal));});
      if(b)lines.push('BODY,'+d+','+fmtW(b.weight)+',');
      if(S.notes[d])lines.push('NOTE,'+d+',"'+S.notes[d].replace(/"/g,"'").replace(/\n/g,' ')+'"');
    });
    var out=document.getElementById('out');out.classList.remove('hide');out.value=lines.length?lines.join('\n'):'記録がまだありません。';out.select();
    if(navigator.clipboard)navigator.clipboard.writeText(out.value).catch(function(){});
  }
  document.getElementById('expDay').addEventListener('click',function(){buildExport('1');});
  document.getElementById('exp7').addEventListener('click',function(){buildExport('7');});

  function isTrainingDay(){return allTodaySets().length>0;}
  function trainMinAuto(){return Math.max(0,allTodaySets().length*3.5);}
  function renderKcal(){
    var pr=document.getElementById('presets');pr.innerHTML='';
    MEAL_PRESETS.forEach(function(p){
      var has=S.meals.some(function(m){return m.date===today&&m.label===p[0];});
      var b=document.createElement('button');b.className='btn sm'+(has?' primary':'');b.textContent=p[0]+' '+p[1];
      b.addEventListener('click',function(){if(has){S.meals=S.meals.filter(function(m){return!(m.date===today&&m.label===p[0]);});}else{S.meals.push({date:today,label:p[0],kcal:p[1]});}save();renderKcal();});
      pr.appendChild(b);
    });
    var ml=document.getElementById('mealList');ml.innerHTML='';
    S.meals.filter(function(m){return m.date===today;}).forEach(function(m,i){
      var r=document.createElement('div');r.className='row';r.style.cssText='justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line);';
      r.innerHTML='<span>'+m.label+'</span><span class="row" style="gap:10px;"><b>'+Math.round(m.kcal)+'</b><button class="del2">削除</button></span>';
      r.querySelector('.del2').addEventListener('click',function(){var idx=S.meals.indexOf(m);if(idx>-1)S.meals.splice(idx,1);save();renderKcal();});
      ml.appendChild(r);
    });
    var cl=document.getElementById('cardioList');cl.innerHTML='';
    S.cardio.filter(function(c){return c.date===today;}).forEach(function(c){
      var r=document.createElement('div');r.className='row';r.style.cssText='justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line);';
      r.innerHTML='<span>'+c.type+' '+c.minutes+'分</span><span class="row" style="gap:10px;"><b>'+Math.round(c.kcal)+' kcal</b><button class="del2">削除</button></span>';
      r.querySelector('.del2').addEventListener('click',function(){var idx=S.cardio.indexOf(c);if(idx>-1)S.cardio.splice(idx,1);save();renderKcal();});
      cl.appendChild(r);
    });
    var intake=S.meals.filter(function(m){return m.date===today;}).reduce(function(a,m){return a+(+m.kcal||0);},0);
    var walkBurn=S.cardio.filter(function(c){return c.date===today;}).reduce(function(a,c){return a+(+c.kcal||0);},0);
    var tmin=(S.trainMin[today]!=null)?S.trainMin[today]:trainMinAuto();
    var tb=Math.round(5.0*weightOn()*tmin/60);
    var tgt=isTrainingDay()?2650:2350;
    document.getElementById('dayType').textContent=isTrainingDay()?'（トレ日 目標2,650）':'（休養日 目標2,350）';
    document.getElementById('mIn').textContent=Math.round(intake).toLocaleString();
    var diff=Math.round(intake)-tgt;document.getElementById('mTgt').textContent='目標 '+tgt.toLocaleString()+'（'+(diff>=0?'+':'')+diff+'）';
    document.getElementById('mBurn').textContent=Math.round(walkBurn+tb).toLocaleString();
    document.getElementById('trainBurn').textContent=tb+' kcal';
    document.getElementById('trainMin').placeholder=Math.round(trainMinAuto())+'（自動）';
    if(S.trainMin[today]!=null)document.getElementById('trainMin').value=S.trainMin[today];
  }
  document.getElementById('addMeal').addEventListener('click',function(){var n=document.getElementById('mealName').value.trim(),k=parseFloat(document.getElementById('mealKcal').value);if(!n||!(k>0))return;S.meals.push({date:today,label:n,kcal:k});save();document.getElementById('mealName').value='';document.getElementById('mealKcal').value='';renderKcal();});
  document.getElementById('addWalk').addEventListener('click',function(){var mets=parseFloat(document.getElementById('walkPace').value),min=parseFloat(document.getElementById('walkMin').value);if(!(min>0))return;var kcal=Math.round(mets*weightOn()*min/60);var label=document.getElementById('walkPace').selectedOptions[0].textContent;S.cardio.push({date:today,type:label,minutes:min,kcal:kcal});save();document.getElementById('walkMin').value='';renderKcal();});
  document.getElementById('saveTrainMin').addEventListener('click',function(){var v=parseFloat(document.getElementById('trainMin').value);if(v>=0)S.trainMin[today]=v;else delete S.trainMin[today];save();renderKcal();});

  var calY,calM;
  function renderCal(){
    var now=new Date();if(calY==null){calY=now.getFullYear();calM=now.getMonth();}
    document.getElementById('calTitle').textContent=calY+'年'+(calM+1)+'月';
    var grid=document.getElementById('calGrid');grid.innerHTML='';
    ['日','月','火','水','木','金','土'].forEach(function(h){var d=document.createElement('div');d.className='h';d.textContent=h;grid.appendChild(d);});
    var first=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
    for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cell empty';grid.appendChild(e);}
    for(var d=1;d<=dim;d++){
      var ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var hasT=S.logs.some(function(l){return l.date===ds;}),hasC=S.cardio.some(function(c){return c.date===ds;});
      var cell=document.createElement('div');cell.className='cell'+((hasT||hasC)?' has':'');cell.innerHTML=d+'<div class="mk"></div>';
      var mk=cell.querySelector('.mk');if(hasT){var i1=document.createElement('i');i1.style.background='#0f6e56';mk.appendChild(i1);}if(hasC){var i2=document.createElement('i');i2.style.background='#a47e1b';mk.appendChild(i2);}
      (function(ds){cell.addEventListener('click',function(){showCalDetail(ds);});})(ds);
      grid.appendChild(cell);
    }
    document.getElementById('calDetail').classList.add('hide');
  }
  function showCalDetail(ds){
    var box=document.getElementById('calDetail');box.classList.remove('hide');
    var t=S.logs.filter(function(l){return l.date===ds;}),c=S.cardio.filter(function(x){return x.date===ds;}),b=S.body.filter(function(x){return x.date===ds;})[0];
    var exMap={};t.forEach(function(l){(exMap[l.exercise]=exMap[l.exercise]||[]).push(l);});
    var html='<div style="font-weight:600;margin-bottom:6px;">'+ds+'</div>';
    if(!t.length&&!c.length&&!b&&!S.notes[ds]){html+='<div class="muted">記録なし</div>';}
    Object.keys(exMap).forEach(function(ex){var ss=exMap[ex].sort(function(a,b){return a.setNo-b.setNo;});html+='<div style="font-size:14px;margin:2px 0;"><b>'+ex+'</b> '+ss.map(function(s){return fmtW(s.weight)+'×'+s.reps;}).join(', ')+'</div>';});
    c.forEach(function(x){html+='<div style="font-size:14px;color:#a47e1b;">'+x.type+' '+x.minutes+'分（'+Math.round(x.kcal)+'kcal）</div>';});
    if(b)html+='<div class="muted" style="font-size:13px;margin-top:4px;">体重 '+fmtW(b.weight)+'kg</div>';
    if(S.notes[ds])html+='<div class="muted" style="font-size:13px;margin-top:4px;">メモ：'+S.notes[ds].replace(/</g,'&lt;')+'</div>';
    box.innerHTML=html;
  }
  document.getElementById('prevM').addEventListener('click',function(){calM--;if(calM<0){calM=11;calY--;}renderCal();});
  document.getElementById('nextM').addEventListener('click',function(){calM++;if(calM>11){calM=0;calY++;}renderCal();});

  function series(metric){
    if(metric==='__bw'){return S.body.slice().sort(function(a,b){return a.date<b.date?-1:1;}).map(function(b){return{date:b.date,v:b.weight};});}
    var byDate={};S.logs.filter(function(l){return l.exercise===metric;}).forEach(function(l){var e=e1rm(l.weight,l.reps);if(!byDate[l.date]||e>byDate[l.date])byDate[l.date]=e;});
    return Object.keys(byDate).sort().map(function(d){return{date:d,v:Math.round(byDate[d])};});
  }
  function renderGraphSel(){
    var sel=document.getElementById('graphSel');var cur=sel.value;sel.innerHTML='';
    var o=document.createElement('option');o.value='__bw';o.textContent='体重';sel.appendChild(o);
    var exs={};S.logs.forEach(function(l){exs[l.exercise]=1;});Object.keys(exs).sort().forEach(function(ex){var op=document.createElement('option');op.value=ex;op.textContent=ex;sel.appendChild(op);});
    if(cur)sel.value=cur;if(!sel.value)sel.value='__bw';
  }
  function renderGraph(){
    renderGraphSel();
    var sel=document.getElementById('graphSel'),data=series(sel.value);
    var box=document.getElementById('graphBox'),stat=document.getElementById('graphStat');
    if(data.length<2){box.innerHTML='<div class="muted" style="padding:20px 0;text-align:center;">記録が2回以上たまると線が出ます。</div>';stat.textContent='';return;}
    var W=320,H=150,pad=24;var vs=data.map(function(d){return d.v;});var mn=Math.min.apply(null,vs),mx=Math.max.apply(null,vs);if(mn===mx){mn-=1;mx+=1;}
    var xx=function(i){return pad+i*(W-2*pad)/(data.length-1);},yy=function(v){return H-pad-(v-mn)/(mx-mn)*(H-2*pad);};
    var pts=data.map(function(d,i){return xx(i)+','+yy(d.v);}).join(' ');
    var dots=data.map(function(d,i){return '<circle cx="'+xx(i).toFixed(1)+'" cy="'+yy(d.v).toFixed(1)+'" r="2.5" fill="#0f6e56"/>';}).join('');
    var svg='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'
      +'<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#e5e7eb"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="#0f6e56" stroke-width="2"/>'+dots
      +'<text x="'+pad+'" y="14" font-size="10" fill="#9ca3af">'+fmtW(mx)+'</text>'
      +'<text x="'+pad+'" y="'+(H-pad+12)+'" font-size="10" fill="#9ca3af">'+data[0].date.slice(5)+'</text>'
      +'<text x="'+(W-pad)+'" y="'+(H-pad+12)+'" font-size="10" fill="#9ca3af" text-anchor="end">'+data[data.length-1].date.slice(5)+'</text></svg>';
    box.innerHTML=svg;
    var ch=data[data.length-1].v-data[0].v;
    var unit=sel.value==='__bw'?'体重':'推定1RM';
    stat.textContent=unit+' 最新 '+fmtW(data[data.length-1].v)+'kg ／ 期間変化 '+(ch>=0?'+':'')+fmtW(ch)+'kg（'+data.length+'回）';
  }
  document.getElementById('graphSel').addEventListener('change',renderGraph);

  var setDay=document.getElementById('setDay');
  function renderSet(){
    fillDaySel(setDay);if(!setDay.value||!S.program[setDay.value])setDay.value=Object.keys(S.program)[0];
    var day=setDay.value,arr=S.program[day],list=document.getElementById('setList');list.innerHTML='';
    arr.forEach(function(row,idx){
      var card=document.createElement('div');card.className='card';
      card.innerHTML='<div class="ctop"><span class="exname">'+row[0]+'</span><div class="row" style="gap:4px;"><button class="btn sm up">▲</button><button class="btn sm down">▼</button></div></div>'
        +'<div class="inrow"><label class="fld" style="margin:0;">休憩秒</label><input class="rs" type="number" inputmode="numeric" value="'+row[1]+'" style="width:84px;"><input class="sch txt" value="'+(row[2]||'').replace(/"/g,'')+'" placeholder="目安" style="flex:1;min-width:90px;"><button class="del2 rm">削除</button></div>';
      card.querySelector('.rs').addEventListener('change',function(){var v=parseInt(this.value,10);if(v>=0){row[1]=v;save();}});
      card.querySelector('.sch').addEventListener('change',function(){row[2]=this.value;save();});
      card.querySelector('.rm').addEventListener('click',function(){arr.splice(idx,1);save();renderSet();renderRec();});
      card.querySelector('.up').addEventListener('click',function(){if(idx>0){arr.splice(idx-1,0,arr.splice(idx,1)[0]);save();renderSet();renderRec();}});
      card.querySelector('.down').addEventListener('click',function(){if(idx<arr.length-1){arr.splice(idx+1,0,arr.splice(idx,1)[0]);save();renderSet();renderRec();}});
      list.appendChild(card);
    });
  }
  setDay.addEventListener('change',renderSet);
  document.getElementById('addEx').addEventListener('click',function(){var n=document.getElementById('newEx').value.trim(),r=parseInt(document.getElementById('newRest').value,10);if(!n)return;S.program[setDay.value].push([n,(r>=0?r:90),'']);save();document.getElementById('newEx').value='';document.getElementById('newRest').value='';renderSet();renderRec();});
  document.getElementById('resetProg').addEventListener('click',function(){if(confirm('メニューを初期設定に戻しますか？（記録データは消えません）')){S.program=JSON.parse(JSON.stringify(DEFAULT_PROGRAM));save();fillDaySel(daySel);renderSet();renderRec();}});

  var TABS=[['rec','記録','M4 7h16M4 12h16M4 17h10'],['kcal','カロリー','M5 12a7 7 0 1 0 14 0 7 7 0 1 0-14 0M12 7v5l3 2'],['cal','カレンダー','M4 6h16v14H4zM4 10h16M8 3v4M16 3v4'],['graph','グラフ','M4 19V5M4 19h16M8 15l3-4 3 2 4-6'],['set','設定','M5 7h14M5 12h14M5 17h14']];
  var nav=document.getElementById('tabs');
  TABS.forEach(function(t){var b=document.createElement('button');b.className='tab';b.id='tab-'+t[0];b.innerHTML='<svg class="ic" viewBox="0 0 24 24"><path d="'+t[2]+'"/></svg>'+t[1];b.addEventListener('click',function(){go(t[0]);});nav.appendChild(b);});
  function go(v){
    ['rec','kcal','cal','graph','set'].forEach(function(x){document.getElementById('view-'+x).classList.toggle('hide',x!==v);document.getElementById('tab-'+x).classList.toggle('active',x===v);});
    document.querySelector('header').style.display=(v==='rec')?'flex':'none';
    if(v==='kcal')renderKcal();if(v==='cal')renderCal();if(v==='graph')renderGraph();if(v==='set')renderSet();
  }
  window.go=go;

  renderRec();go('rec');
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
  if('Notification' in window&&Notification.permission==='granted')ensurePush();
})();
</script>
